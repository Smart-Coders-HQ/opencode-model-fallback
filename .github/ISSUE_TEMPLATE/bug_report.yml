name: Bug Report
description: Report a bug or unexpected behavior in opencode-model-fallback
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      placeholder: "e.g. 1.2.24"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: A clear description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Your model-fallback.json config (redact sensitive values)
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant lines from your log file (`~/.local/share/opencode/logs/`).
      render: text

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure fallback chain with ...
        2. Send a message that triggers a rate limit
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
